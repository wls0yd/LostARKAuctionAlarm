name: Build and Release EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "릴리즈 태그 (예: v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout (push tag)
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Checkout (manual tag)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Inject app version from tag
        shell: cmd
        run: |
          if "%GITHUB_EVENT_NAME%"=="workflow_dispatch" (
            > data\app_version.txt (echo ${{ inputs.tag }})
          ) else (
            > data\app_version.txt (echo %GITHUB_REF_NAME%)
          )

      - name: Build exe
        shell: cmd
        run: build_tools\build_exe.bat

      - name: Create or update release from push tag
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: exe/LostArkWatcher.exe
          generate_release_notes: true
          overwrite_files: true

      - name: Create or update release from manual tag
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: exe/LostArkWatcher.exe
          generate_release_notes: true
          overwrite_files: true
